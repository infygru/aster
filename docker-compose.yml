version: '3.8'

services:
  database:
    image: postgres:15-alpine
    container_name: aster_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: directus
      POSTGRES_PASSWORD: directus_password
      POSTGRES_DB: aster_homecare
    ports:
      - '5432:5432'
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U directus -d aster_homecare']
      interval: 10s
      timeout: 5s
      retries: 5

  cache:
    image: redis:7-alpine
    container_name: aster_cache
    restart: unless-stopped
    ports:
      - '6379:6379'

  directus:
    image: directus/directus:10.13
    container_name: aster_directus
    restart: unless-stopped
    ports:
      - '8055:8055'
    depends_on:
      database:
        condition: service_healthy
      cache:
        condition: service_started
    environment:
      # Key & Secret — change these before going to production
      KEY: 'a-long-random-key-change-in-production'
      SECRET: 'a-long-random-secret-change-in-production'

      # Database
      DB_CLIENT: pg
      DB_HOST: database
      DB_PORT: 5432
      DB_DATABASE: aster_homecare
      DB_USER: directus
      DB_PASSWORD: directus_password

      # Cache
      CACHE_ENABLED: 'true'
      CACHE_STORE: redis
      REDIS: redis://cache:6379

      # Admin account (change password after first login)
      ADMIN_EMAIL: admin@asterhomecare.co.uk
      ADMIN_PASSWORD: AsterAdmin2024!

      # Public URL (update for production)
      PUBLIC_URL: http://localhost:8055

      # CORS — allow the Next.js dev server
      CORS_ENABLED: 'true'
      CORS_ORIGIN: 'http://localhost:3000'
      CORS_METHODS: GET,POST,PATCH,DELETE
      CORS_ALLOWED_HEADERS: Content-Type,Authorization

      # Email (configure for production)
      EMAIL_FROM: noreply@asterhomecare.co.uk
      EMAIL_TRANSPORT: sendmail

      # Assets
      STORAGE_LOCATIONS: local
      STORAGE_LOCAL_DRIVER: local
      STORAGE_LOCAL_ROOT: /directus/uploads

    volumes:
      - directus_uploads:/directus/uploads
      - directus_extensions:/directus/extensions

volumes:
  db_data:
  directus_uploads:
  directus_extensions:
